{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Task: {{ task.title }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% if is_admin %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ task.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ task.description or '' }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label for="due_date" class="form-label">Due Date</label>
                        <input type="date" class="form-control" id="due_date" name="due_date" value="{{ task.due_date.strftime('%Y-%m-%d') }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="priority" class="form-label">Priority</label>
                        <select class="form-select" id="priority" name="priority">
                            {% for priority in PriorityEnum %}
                            <option value="{{ priority.value }}" {% if task.priority.value == priority.value %}selected{% endif %}>
                                {{ priority.value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            {% for status in StatusEnum %}
                            <option value="{{ status.value }}" {% if task.status.value == status.value %}selected{% endif %}>
                                {{ status.value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="assigned_user_id" class="form-label">Assign To</label>
                        <select class="form-select" id="assigned_user_id" name="assigned_user_id">
                            <option value="">Unassigned</option>
                            {% for member in members %}
                            <option value="{{ member.id }}" {% if task.assigned_user_id == member.id %}selected{% endif %}>
                                {{ member.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    {% else %}
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <p class="form-control-static">{{ task.title }}</p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="status" name="status">
                            {% for status in StatusEnum %}
                            <option value="{{ status.value }}" {% if task.status.value == status.value %}selected{% endif %}>
                                {{ status.value }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="alert alert-info">
                        <small>As a member, you can only update the task status.</small>
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="{{ url_for('project_detail', project_id=project.id) }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
